<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Trainer</title>
<style>
  :root{--bg:#0f1117;--surface:#181c27;--border:#252a38;--accent:#5b8fff;--accent-soft:rgba(91,143,255,0.12);--accent-glow:rgba(91,143,255,0.3);--green:#3ecf8e;--green-soft:rgba(62,207,142,0.12);--red:#f26f6f;--red-soft:rgba(242,111,111,0.12);--text:#e8eaf2;--muted:#6b7280;--card-bg:#1a1f2e;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;max-width:720px;padding:28px 24px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .header-left{display:flex;align-items:baseline;gap:12px}
  header h1{font-family:var(--font);font-weight:700;font-size:1.8rem;color:var(--text);letter-spacing:-0.01em}
  header span.tag{font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-glow);border-radius:4px;padding:2px 8px}
  .lang-bar{display:flex;gap:6px;flex-wrap:wrap}
  .lang-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:.78rem;font-weight:600;padding:5px 11px;border-radius:7px;cursor:pointer;transition:all .18s}
  .lang-btn:hover{border-color:var(--accent);color:var(--accent)}
  .lang-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .mode-bar{width:100%;max-width:720px;padding:16px 24px 0;display:flex;gap:8px;flex-wrap:wrap}
  .mode-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:.82rem;font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .18s;letter-spacing:.02em}
  .mode-btn:hover{border-color:var(--accent);color:var(--accent)}
  .mode-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .progress-wrap{width:100%;max-width:720px;padding:16px 24px 0;display:flex;align-items:center;gap:14px}
  .progress-bar{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
  .progress-label{font-size:.78rem;color:var(--muted);white-space:nowrap;font-weight:500}
  .score-pill{display:flex;gap:12px;font-size:.78rem;font-weight:600}
  .score-pill .s-ok{color:var(--green)}
  .score-pill .s-err{color:var(--red)}
  .main{width:100%;max-width:720px;padding:24px 24px 60px;flex:1}
  /* FLASHCARD */
  .flashcard-wrap{perspective:1200px;cursor:pointer;user-select:none;margin-bottom:20px}
  .flashcard{position:relative;width:100%;min-height:220px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
  .flashcard.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card-bg);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:36px 32px;min-height:220px}
  .card-face.back{transform:rotateY(180deg);background:var(--surface);border-color:var(--accent-glow)}
  .card-label{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .card-word{font-weight:700;font-size:2.2rem;letter-spacing:-.02em;color:var(--text);text-align:center;line-height:1.2}
  .card-hint{font-size:.8rem;color:var(--accent);font-style:italic;margin-top:4px}
  .card-translation{font-size:1.05rem;color:var(--text);text-align:center;line-height:1.5;margin-top:4px}
  .tap-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-top:-8px;margin-bottom:16px}
  .flash-btns{display:flex;gap:12px;justify-content:center}
  .flash-btn{font-family:var(--font);font-size:.85rem;font-weight:600;padding:10px 28px;border-radius:10px;border:none;cursor:pointer;transition:all .18s}
  .flash-btn.knew{background:var(--green-soft);color:var(--green);border:1px solid rgba(62,207,142,.3)}
  .flash-btn.knew:hover{background:rgba(62,207,142,.22)}
  .flash-btn.forgot{background:var(--red-soft);color:var(--red);border:1px solid rgba(242,111,111,.3)}
  .flash-btn.forgot:hover{background:rgba(242,111,111,.22)}
  /* QUIZ */
  .quiz-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:40px 32px 32px;margin-bottom:20px}
  .quiz-q-label{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .quiz-question{font-weight:700;font-size:2rem;letter-spacing:-.02em;margin-bottom:28px;line-height:1.2}
  .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .quiz-opt{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.86rem;font-weight:500;padding:14px 16px;border-radius:10px;cursor:pointer;text-align:left;transition:all .18s;line-height:1.4}
  .quiz-opt:hover:not([disabled]){border-color:var(--accent);background:var(--accent-soft)}
  .quiz-opt.correct{border-color:var(--green)!important;background:var(--green-soft)!important;color:var(--green)!important}
  .quiz-opt.wrong{border-color:var(--red)!important;background:var(--red-soft)!important;color:var(--red)!important}
  /* GLOSSARY */
  .glossary-search{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.95rem;padding:12px 16px;border-radius:10px;width:100%;outline:none;margin-bottom:18px;transition:border-color .18s}
  .glossary-search:focus{border-color:var(--accent)}
  .glossary-section{margin-bottom:28px}
  .glossary-section-title{font-size:.68rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .glossary-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:baseline;flex-wrap:wrap}
  .glossary-item:last-child{border-bottom:none}
  .glo-de{font-weight:600;font-size:1.05rem;color:var(--text);min-width:200px;flex-shrink:0}
  .glo-tr{font-size:.85rem;color:var(--muted);line-height:1.4}
  /* DONE */
  .done-screen{text-align:center;padding:60px 0}
  .done-screen h2{font-weight:700;font-size:2.4rem;margin-bottom:10px}
  .done-screen p{color:var(--muted);margin-bottom:28px}
  .restart-btn{background:var(--accent-soft);border:1px solid var(--accent-glow);color:var(--accent);font-family:var(--font);font-size:.9rem;font-weight:600;padding:12px 28px;border-radius:10px;cursor:pointer;transition:all .18s}
  .restart-btn:hover{background:rgba(91,143,255,.22)}
  [dir=rtl] .card-word,[dir=rtl] .card-translation{text-align:right}
  
  /* MOBILE OPTIMIZATIONS */
  @media(max-width:550px){
    header, .mode-bar, .progress-wrap { padding: 16px 16px 0; }
    .main { padding: 16px 16px 60px; }
    .quiz-options { grid-template-columns: 1fr; gap: 12px; }
    .quiz-opt { padding: 16px; font-size: 1rem; }
    .card-word { font-size: 1.8rem; }
    .lang-btn { font-size: .75rem; padding: 8px 12px; }
    .mode-btn { font-size: .85rem; padding: 10px 16px; text-align: center; }
    .mode-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .flash-btns { width: 100%; }
    .flash-btn { flex: 1; padding: 14px; font-size: .95rem; }
    .glossary-item { flex-direction: column; align-items: flex-start; gap: 4px; }
    .glo-de { min-width: auto; }
  }
</style>
</head>

// ── STATE ──
const LANGS = ['ru','tr'];
const LANG_LABELS = {ru:'🇷🇺 RU',tr:'🇹🇷 TR'};
let lang = 'ru';
let mode = 'flash';
let deck = [], cur = 0, flipped = false, scoreOk = 0, scoreErr = 0, answered = false;
// quiz: store options as an array, index-based click to avoid HTML escaping issues
let quizOpts = [], quizCorrectIdx = -1;

function t(k){ return UI[lang][k] || k; }
function tr(w){ return w[lang] || w.ru; }
function cat(w){ return (w.cat && w.cat[lang]) || (w.cat && w.cat.ru) || ''; }

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ── LANG ──
function buildLangBar(){
  document.getElementById('langBar').innerHTML =
    LANGS.map(l=>`<button class="lang-btn${l===lang?' active':''}" onclick="setLang('${l}')">${LANG_LABELS[l]}</button>`).join('');
}
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.documentElement.dir=UI[l].dir;
  buildLangBar(); buildModeBar(); resetSession();
}

// ── MODE ──
function buildModeBar(){
  const modes=['flash','quiz','glossary'];
  document.getElementById('modeBar').innerHTML =
    modes.map(m=>`<button class="mode-btn${m===mode?' active':''}" onclick="setMode('${m}')">${t(m)}</button>`).join('');
}
function setMode(m){ mode=m; buildModeBar(); resetSession(); }

// ── SESSION ──
function resetSession(){
  deck=shuffle(VOCAB); cur=0; flipped=false; scoreOk=0; scoreErr=0; answered=false;
  updateScore(); renderCurrent();
}
function updateProgress(){
  const pct=deck.length?(cur/deck.length)*100:0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=mode!=='glossary'?`${cur} / ${deck.length}`:'';
  document.getElementById('progressWrap').style.display=mode==='glossary'?'none':'';
}
function updateScore(){
  document.getElementById('scoreOk').textContent='✓ '+scoreOk;
  document.getElementById('scoreErr').textContent='✗ '+scoreErr;
  updateProgress();
}
function renderCurrent(){
  updateProgress();
  if(mode==='glossary'){renderGlossary();return;}
  if(cur>=deck.length){renderDone();return;}
  const word=deck[cur];
  if(mode==='flash') renderFlash(word);
  else if(mode==='quiz') renderQuiz(word);
}

// ── FLASH ──
function renderFlash(word){
  flipped=false; answered=false;
  document.getElementById('main').innerHTML=`
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="fc">
        <div class="card-face front">
          <div class="card-label">${t('german')}</div>
          <div class="card-word">${word.de}</div>
          <div class="card-hint">${cat(word)}</div>
        </div>
        <div class="card-face back">
          <div class="card-label">${t('translation')}</div>
          <div class="card-translation">${tr(word)}</div>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tapHint">${t('tapHint')}</p>
    <div class="flash-btns" id="flashBtns" style="display:none">
      <button class="flash-btn forgot" onclick="markCard(false)">${t('forgot')}</button>
      <button class="flash-btn knew" onclick="markCard(true)">${t('knew')}</button>
    </div>`;
}
function flipCard(){
  if(answered) return;
  flipped=!flipped;
  document.getElementById('fc').classList.toggle('flipped',flipped);
  if(flipped){
    document.getElementById('flashBtns').style.display='flex';
    document.getElementById('tapHint').textContent=t('didYouKnow');
  }
}
function markCard(knew){
  answered=true;
  if(knew) scoreOk++; else scoreErr++;
  cur++; updateScore(); setTimeout(renderCurrent,200);
}

// ── QUIZ ──
function renderQuiz(word){
  answered=false;
  // Build options array — store in JS variable, never in HTML attributes
  const correct=tr(word);
  const pool=shuffle(VOCAB.filter(v=>tr(v)!==correct)).slice(0,3).map(v=>tr(v));
  quizOpts=shuffle([correct,...pool]);
  quizCorrectIdx=quizOpts.indexOf(correct);

  const btns=quizOpts.map((o,i)=>`<button class="quiz-opt" id="qopt${i}" onclick="checkQuiz(${i})">${o}</button>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="quiz-card">
      <div class="quiz-q-label">${t('chooseTranslation')}</div>
      <div class="quiz-question">${word.de}</div>
      <div class="quiz-options">${btns}</div>
    </div>`;
}
function checkQuiz(idx){
  if(answered) return;
  answered=true;
  quizOpts.forEach((_,i)=>{
    const b=document.getElementById('qopt'+i);
    b.disabled=true;
    if(i===quizCorrectIdx) b.classList.add('correct');
  });
  if(idx===quizCorrectIdx){ scoreOk++; }
  else{ document.getElementById('qopt'+idx).classList.add('wrong'); scoreErr++; }
  updateScore();
  setTimeout(()=>{ cur++; renderCurrent(); },1100);
}

// ── GLOSSARY ──
function renderGlossary(){
  const cats={};
  VOCAB.forEach(v=>{ const c=cat(v); if(!cats[c]) cats[c]=[]; cats[c].push(v); });
  const dir=UI[lang].dir;
  document.getElementById('main').innerHTML=`
    <input class="glossary-search" id="gSearch" placeholder="${t('search')}" oninput="filterGlossary(this.value)" dir="${dir}">
    <div id="gList">
      ${Object.entries(cats).map(([c,words])=>`
        <div class="glossary-section">
          <div class="glossary-section-title">${c}</div>
          ${words.map(w=>`<div class="glossary-item"><div class="glo-de">${w.de}</div><div class="glo-tr" dir="${dir}">${tr(w)}</div></div>`).join('')}
        </div>`).join('')}
    </div>`;
  document.getElementById('gSearch').focus();
}
function filterGlossary(q){
  const nq=q.toLowerCase();
  document.querySelectorAll('.glossary-item').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(nq)?'':'none';
  });
  document.querySelectorAll('.glossary-section').forEach(sec=>{
    sec.style.display=[...sec.querySelectorAll('.glossary-item')].some(i=>i.style.display!=='none')?'':'none';
  });
}

// ── DONE ──
function renderDone(){
  const total=scoreOk+scoreErr, pct=total?Math.round(scoreOk/total*100):0;
  const msg=t('doneMsg').replace('{ok}',scoreOk).replace('{total}',total).replace('{pct}',pct);
  document.getElementById('main').innerHTML=`
    <div class="done-screen">
      <h2>${t('done')}</h2><p>${msg}</p>
      <button class="restart-btn" onclick="resetSession()">${t('restart')}</button>
    </div>`;
}

// ── INIT ──
buildLangBar(); buildModeBar(); resetSession();
</script>
