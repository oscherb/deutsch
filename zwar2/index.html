<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Trainer für doppelte Konnektoren</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
<header>
    <h1>Trainer für doppelte Konnektoren</h1>
    <div class="controls-top">
        <button id="themeToggle">Dunkles / helles Design wechseln</button>
        <button id="homeButton" onclick="window.location.href='index.html'">Zur Startseite</button>
    </div>
</header>

<main>
    <section class="settings">
        <h2>Schwierigkeitsgrad wählen</h2>
        <div class="difficulty-buttons">
            <button class="difficulty-btn" data-level="A2">A2</button>
            <button class="difficulty-btn" data-level="B1">B1</button>
            <button class="difficulty-btn" data-level="B2">B2</button>
        </div>
    </section>

    <section class="exercise">
        <h2>Übungssatz</h2>
        <p id="currentPairLabel"></p>
        <div id="sentenceContainer"></div>

        <div id="connectorButtonsContainer"></div>

        <button id="nextSentenceButton" class="hidden">Nächster Satz</button>
    </section>
</main>

<script src="sentences.js"></script>
<script src="main.js"></script>
</body>
</html>
