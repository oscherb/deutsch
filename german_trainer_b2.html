<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Trainer — Arbeit & Beruf</title>
<style>
  :root{--bg:#0f1117;--surface:#181c27;--border:#252a38;--accent:#5b8fff;--as:rgba(91,143,255,0.12);--ag:rgba(91,143,255,0.3);--green:#3ecf8e;--gs:rgba(62,207,142,0.12);--red:#f26f6f;--rs:rgba(242,111,111,0.12);--text:#e8eaf2;--muted:#6b7280;--card:#1a1f2e;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;max-width:760px;padding:28px 20px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-weight:700;font-size:1.7rem;letter-spacing:-0.01em}
  .tag{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--as);border:1px solid var(--ag);border-radius:4px;padding:3px 9px}
  .stats{margin-left:auto;font-size:.8rem;color:var(--muted);font-weight:500}
  .mode-bar{width:100%;max-width:760px;padding:14px 20px 0;display:flex;gap:8px;flex-wrap:wrap}
  .mode-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--font);font-size:.82rem;font-weight:500;padding:7px 18px;border-radius:8px;cursor:pointer;transition:all .18s}
  .mode-btn:hover{border-color:var(--accent);color:var(--accent)}
  .mode-btn.active{background:var(--as);border-color:var(--accent);color:var(--accent)}
  .prog-wrap{width:100%;max-width:760px;padding:14px 20px 0;display:flex;align-items:center;gap:14px}
  .prog-bar{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .35s ease}
  .prog-label{font-size:.76rem;color:var(--muted);white-space:nowrap}
  .score{display:flex;gap:12px;font-size:.78rem;font-weight:600}
  .s-ok{color:var(--green)} .s-err{color:var(--red)}
  .main{width:100%;max-width:760px;padding:22px 20px 60px;flex:1}

  /* FLASHCARD */
  .fc-wrap{perspective:1200px;cursor:pointer;user-select:none;margin-bottom:18px}
  .fc{position:relative;width:100%;min-height:210px;transform-style:preserve-3d;transition:transform .48s cubic-bezier(.4,0,.2,1)}
  .fc.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:var(--card);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:32px 28px;min-height:210px}
  .face.back{transform:rotateY(180deg);background:var(--surface);border-color:var(--ag)}
  .face-lbl{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .face-word{font-weight:700;font-size:2rem;text-align:center;line-height:1.2;letter-spacing:-.01em}
  .face-cat{font-size:.78rem;color:var(--accent);margin-top:2px}
  .face-tr{font-size:1.05rem;text-align:center;line-height:1.5;color:var(--text);margin-top:4px}
  .tap-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:14px}
  .fbbtns{display:flex;gap:12px;justify-content:center}
  .fbbtn{font-family:var(--font);font-size:.85rem;font-weight:600;padding:10px 28px;border-radius:10px;border:none;cursor:pointer;transition:all .18s}
  .fbbtn.knew{background:var(--gs);color:var(--green);border:1px solid rgba(62,207,142,.3)}
  .fbbtn.knew:hover{background:rgba(62,207,142,.22)}
  .fbbtn.forgot{background:var(--rs);color:var(--red);border:1px solid rgba(242,111,111,.3)}
  .fbbtn.forgot:hover{background:rgba(242,111,111,.22)}

  /* QUIZ */
  .qcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 28px 28px;margin-bottom:18px}
  .qlbl{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .qword{font-weight:700;font-size:1.9rem;letter-spacing:-.01em;margin-bottom:24px;line-height:1.2}
  .qopts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .qopt{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.86rem;font-weight:500;padding:13px 15px;border-radius:10px;cursor:pointer;text-align:left;transition:all .16s;line-height:1.4}
  .qopt:hover:not([disabled]){border-color:var(--accent);background:var(--as)}
  .qopt.correct{border-color:var(--green)!important;background:var(--gs)!important;color:var(--green)!important}
  .qopt.wrong{border-color:var(--red)!important;background:var(--rs)!important;color:var(--red)!important}

  /* GLOSSARY */
  .gsearch{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:.95rem;padding:11px 15px;border-radius:10px;width:100%;outline:none;margin-bottom:16px;transition:border-color .18s}
  .gsearch:focus{border-color:var(--accent)}
  .gsec{margin-bottom:26px}
  .gsec-title{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .gitem{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);align-items:baseline;flex-wrap:wrap}
  .gitem:last-child{border-bottom:none}
  .g-de{font-weight:600;font-size:1rem;color:var(--text);min-width:220px;flex-shrink:0}
  .g-ru{font-size:.84rem;color:var(--muted);line-height:1.4}

  /* DONE */
  .done{text-align:center;padding:60px 0}
  .done h2{font-weight:700;font-size:2.2rem;margin-bottom:10px}
  .done p{color:var(--muted);margin-bottom:26px;font-size:1rem}
  .restart{background:var(--as);border:1px solid var(--ag);color:var(--accent);font-family:var(--font);font-size:.9rem;font-weight:600;padding:11px 28px;border-radius:10px;cursor:pointer;transition:all .18s}
  .restart:hover{background:rgba(91,143,255,.22)}

  @media(max-width:520px){.qopts{grid-template-columns:1fr}.face-word{font-size:1.6rem}.qword{font-size:1.5rem}.g-de{min-width:0;width:100%}}
</style>
</head>
<body>

</div>
<div class="main" id="main"></div>

// ── Fix capitalisation of die Überstunde
VOCAB.forEach(v => {
  if (v.de.startsWith('die überstunde')) v.de = v.de.replace('die überstunde', 'die Überstunde');
});

let mode = 'flash';
let deck = [], cur = 0, flipped = false, scoreOk = 0, scoreErr = 0, answered = false;
let quizOpts = [], quizCorr = -1;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['flash','quiz','glossary'][i]===m));
  reset();
}

function reset(){
  deck=shuffle(VOCAB); cur=0; flipped=false; scoreOk=0; scoreErr=0; answered=false;
  updateUI(); render();
}

function updateUI(){
  document.getElementById('sOk').textContent='✓ '+scoreOk;
  document.getElementById('sErr').textContent='✗ '+scoreErr;
  const pct=deck.length?(cur/deck.length)*100:0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=mode!=='glossary'?cur+' / '+deck.length:'';
  document.getElementById('progWrap').style.display=mode==='glossary'?'none':'';
  document.getElementById('stats').textContent='247 слов';
}

function render(){
  updateUI();
  if(mode==='glossary'){renderGlossary();return;}
  if(cur>=deck.length){renderDone();return;}
  const w=deck[cur];
  if(mode==='flash') renderFlash(w);
  else renderQuiz(w);
}

// ── FLASH ──
function renderFlash(w){
  flipped=false; answered=false;
  document.getElementById('main').innerHTML=`
    <div class="fc-wrap" onclick="flip()">
      <div class="fc" id="fc">
        <div class="face front">
          <div class="face-lbl">Немецкий</div>
          <div class="face-word">${esc(w.de)}</div>
          <div class="face-cat">${esc(w.cat)}</div>
        </div>
        <div class="face back">
          <div class="face-lbl">Перевод</div>
          <div class="face-tr">${esc(w.ru)}</div>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="th">Нажми на карточку, чтобы увидеть перевод</p>
    <div class="fbbtns" id="fbb" style="display:none">
      <button class="fbbtn forgot" onclick="mark(false)">Не знал</button>
      <button class="fbbtn knew" onclick="mark(true)">Знал ✓</button>
    </div>`;
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function flip(){
  if(answered)return;
  flipped=!flipped;
  document.getElementById('fc').classList.toggle('flipped',flipped);
  if(flipped){
    document.getElementById('fbb').style.display='flex';
    document.getElementById('th').textContent='Ты знал это слово?';
  }
}

function mark(knew){
  answered=true;
  if(knew)scoreOk++;else scoreErr++;
  cur++; updateUI(); setTimeout(render,180);
}

// ── QUIZ ──
function renderQuiz(w){
  answered=false;
  const correct=w.ru;
  const pool=shuffle(VOCAB.filter(v=>v.ru!==correct)).slice(0,3).map(v=>v.ru);
  quizOpts=shuffle([correct,...pool]);
  quizCorr=quizOpts.indexOf(correct);
  const btns=quizOpts.map((o,i)=>`<button class="qopt" id="qo${i}" onclick="checkQ(${i})">${esc(o)}</button>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="qcard">
      <div class="qlbl">Выбери перевод</div>
      <div class="qword">${esc(w.de)}</div>
      <div class="qopts">${btns}</div>
    </div>`;
}

function checkQ(idx){
  if(answered)return;
  answered=true;
  quizOpts.forEach((_,i)=>{
    const b=document.getElementById('qo'+i);
    b.disabled=true;
    if(i===quizCorr)b.classList.add('correct');
  });
  if(idx===quizCorr)scoreOk++;
  else{document.getElementById('qo'+idx).classList.add('wrong');scoreErr++;}
  updateUI();
  setTimeout(()=>{cur++;render();},1100);
}

// ── GLOSSARY ──
function renderGlossary(){
  const cats={};
  VOCAB.forEach(v=>{if(!cats[v.cat])cats[v.cat]=[];cats[v.cat].push(v);});
  document.getElementById('main').innerHTML=`
    <input class="gsearch" id="gs" placeholder="Поиск по немецкому или русскому..." oninput="filterG(this.value)">
    <div id="gl">
      ${Object.entries(cats).map(([c,ws])=>`
        <div class="gsec">
          <div class="gsec-title">${esc(c)}</div>
          ${ws.map(w=>`<div class="gitem"><div class="g-de">${esc(w.de)}</div><div class="g-ru">${esc(w.ru)}</div></div>`).join('')}
        </div>`).join('')}
    </div>`;
  document.getElementById('gs').focus();
}

function filterG(q){
  const nq=q.toLowerCase();
  document.querySelectorAll('.gitem').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(nq)?'':'none';
  });
  document.querySelectorAll('.gsec').forEach(s=>{
    s.style.display=[...s.querySelectorAll('.gitem')].some(i=>i.style.display!=='none')?'':'none';
  });
}

// ── DONE ──
function renderDone(){
  const total=scoreOk+scoreErr,pct=total?Math.round(scoreOk/total*100):0;
  document.getElementById('main').innerHTML=`
    <div class="done">
      <h2>Готово! 🎉</h2>
      <p>Правильно: ${scoreOk} из ${total} (${pct}%)</p>
      <button class="restart" onclick="reset()">Начать заново</button>
    </div>`;
}

reset();
</script>
